<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PulseFlow AI - Content-driven outreach automation. Vectorize your content, fetch leads, and generate hyper-personalized cold emails."
    />
    <title>PulseFlow AI - Content-Driven Outreach Automation</title>
    <script>
      (function () {
        var k = "pulseflow-theme";
        var t = null;
        try { t = localStorage.getItem(k); } catch (e) {}
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.classList.toggle("dark", t === "dark");
        document.documentElement.style.colorScheme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
